services:
  web:
    image: odoo:18.0
    user: root
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./addons_custom:/mnt/extra-addons
      - ./config:/etc/odoo
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=myodoo
      - ODOO_RC=/etc/odoo/odoo.conf
    restart: always

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=myodoo
      - POSTGRES_USER=odoo
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: always

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always
    # Para GPU NVIDIA descomentar las siguientes líneas:
